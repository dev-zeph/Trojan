name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        run: |
          VERSION=$(awk '/^go /{print $2}' go.mod)
          curl -fsSL "https://go.dev/dl/go${VERSION}.linux-amd64.tar.gz" | sudo tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci

      # Import the GPG private key from GitHub Actions secrets.
      # To set this up:
      #   1. gpg --full-generate-key  (RSA 4096, no expiry recommended)
      #   2. gpg --armor --export-secret-keys your@email.com | base64
      #      → paste output as GitHub secret GPG_PRIVATE_KEY
      #   3. gpg --list-keys --with-colons your@email.com | grep '^fpr' | head -1 | cut -d: -f10
      #      → paste fingerprint as GitHub secret GPG_FINGERPRINT
      #   4. gpg --armor --export your@email.com
      #      → paste public key into internal/config/pubkey.go
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Compute SHA256 of each extracted binary (not the archive) and sign
      # the resulting file. This is what `trojan verify` downloads — it's
      # much smaller than downloading the full archive just to verify.
      - name: Compute and sign binary checksums
        env:
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTFILE="dist/trojan_${VERSION}_binary_checksums.txt"

          for archive in dist/*.tar.gz; do
            name=$(basename "$archive" .tar.gz)            # trojan_1.0.0_darwin_arm64
            platform="${name#trojan_${VERSION}_}"           # darwin_arm64

            tmpdir=$(mktemp -d)
            tar -xzf "$archive" -C "$tmpdir"
            hash=$(sha256sum "$tmpdir/trojan" | cut -d' ' -f1)
            echo "$hash  trojan_${platform}" >> "$OUTFILE"
            rm -rf "$tmpdir"
          done

          echo ""
          echo "Binary checksums:"
          cat "$OUTFILE"

          gpg --batch \
              --local-user "$GPG_FINGERPRINT" \
              --output "${OUTFILE}.sig" \
              --detach-sign "$OUTFILE"

      # Upload the binary checksums + signature to the GitHub release.
      - name: Upload binary checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "dist/trojan_${VERSION}_binary_checksums.txt" \
            "dist/trojan_${VERSION}_binary_checksums.txt.sig" \
            --clobber

      # SLSA provenance attestation — temporarily disabled due to GitHub CDN issues.
      # Re-enable actions/attest-build-provenance@v2 once stable.
