version: 2

before:
  hooks:
    # UI builds run as explicit CI steps before GoReleaser — these are kept as
    # a fallback for local `goreleaser release --snapshot` runs.
    - sh -c "cd ui && npm ci && npm run build"
    - sh -c "cd dast-ui && npm ci && npm run build"

builds:
  - id: trojan
    main: ./cmd/trojan
    binary: trojan
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: trojan
    formats: [tar.gz]
    name_template: "trojan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "trojan_{{ .Version }}_checksums.txt"

release:
  github:
    owner: dev-zeph
    name: Trojan
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
