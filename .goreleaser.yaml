version: 2

before:
  hooks:
    - sh -c "cd ui && npm run build"

builds:
  - id: trojan
    main: ./cmd/trojan
    binary: trojan
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: trojan
    formats: [tar.gz]
    name_template: "trojan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "trojan_{{ .Version }}_checksums.txt"

release:
  github:
    owner: dev-zeph
    name: Trojan
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

homebrew:
  - name: trojan
    repository:
      owner: dev-zeph
      name: homebrew-trojan
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://trojan.dev"
    description: "Developer-first security CLI. Catch vulnerabilities before they ship."
    license: "BUSL-1.1"
    install: |
      bin.install "trojan"
    test: |
      system "#{bin}/trojan", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
